apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-ingress
  namespace: default
spec:
  podSelector: {}
  # Empty podSelector selects every pod in the namespace.
  # This sets a deny-all baseline before any allow rules are applied.

  policyTypes:
    - Ingress
  # No ingress rules are defined.
  # Absence of rules means all ingress traffic is denied by default.
  # Apply this policy first, then layer specific allow rules on top.
  # This is the whitelist (allowlist) model — new pods are blocked until
  # explicitly permitted.